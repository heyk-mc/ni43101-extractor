repos:
  # =============================
  # Pre-commit hooks 官方仓库
  # =============================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        name: 删除行尾空格
      - id: end-of-file-fixer
        name: 确保文件末尾有换行
      - id: check-yaml
        name: 检查 YAML 语法
        args: ["--unsafe"]
      - id: check-json
        name: 检查 JSON 语法
      - id: check-toml
        name: 检查 TOML 语法
      - id: check-added-large-files
        name: 检查大文件
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
        name: 检查合并冲突标记
      - id: debug-statements
        name: 检查调试语句

  # =============================
  # Ruff - Python Linting
  # =============================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        name: Ruff 代码检查
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        name: Ruff 格式化

  # =============================
  # Black - Python 格式化
  # =============================
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        name: Black 格式化
        language_version: python3.10

  # =============================
  # Mypy - 类型检查
  # =============================
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.1
    hooks:
      - id: mypy
        name: Mypy 类型检查
        additional_dependencies:
          - pydantic>=2.5.0
          - types-requests
        args:
          - --ignore-missing-imports
          - --disallow-untyped-defs=false
        exclude: ^tests/

  # =============================
  # Pytest - 运行测试
  # =============================
  # 注意：通常测试在 CI 中运行，pre-commit 可选
  # - repo: local
  #   hooks:
  #     - id: pytest
  #       name: Pytest 单元测试
  #       entry: pytest tests/ -v
  #       language: system
  #       pass_filenames: false
  #       always_run: true
